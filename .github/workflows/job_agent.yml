name: Job Agent Daily Run

on:
  schedule:
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright
        run: playwright install chromium

      - name: Restore Gmail token
        run: echo "${{ secrets.GMAIL_TOKEN_B64 }}" | base64 -d > gmail_token.pickle

      - name: Create env file
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          echo "HUNTER_API_KEY=${{ secrets.HUNTER_API_KEY }}" >> .env
          echo "GMAIL_SENDER=${{ secrets.GMAIL_SENDER }}" >> .env
          echo "GMAIL_SENDER_NAME=Mariam Latsabidze | AI Engineer" >> .env

      - name: Run job agent
        run: python main.py

      - name: Commit pending drafts
        run: |
          git config user.email "actions@github.com"
          git config user.name "Job Agent"
          git add pending_drafts.json
          git diff --staged --quiet || git commit -m "Update pending drafts [skip ci]"
          git push

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-log-${{ github.run_number }}
          path: agent.log
          retention-days: 7
          if-no-files-found: ignore
